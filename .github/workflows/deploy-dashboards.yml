# 저장소 Settings → Pages → Source: GitHub Actions (최초 1회 설정 필요)
# 배포 후: https://<user>.github.io/<repo>/index.html
name: Deploy HTML dashboards to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - ".github/workflows/deploy-dashboards.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Collect site (repo-root HTML only)
        run: |
          mkdir -p _site
          shopt -s nullglob
          for f in *.html; do cp "$f" _site/; done
          test "$(ls -A _site)" || { echo "No HTML files in repo root"; exit 1; }

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
